<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grand Anniversary Celebration</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #05030a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; display: flex; flex-direction: column; justify-content: space-between; padding: 40px 15px; text-align: center; color: white; }
        .header { font-size: 1.6rem; font-weight: bold; color: #ffd700; text-shadow: 0 0 12px rgba(255, 215, 0, 0.4); letter-spacing: 1px; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 35px 20px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0,0,0,0.6); margin: auto 10px; max-width: 480px; align-self: center; transition: transform 0.2s ease; }
        .names { font-size: 2.3rem; font-weight: bold; color: #ffffff; text-shadow: 0 0 15px #ff1e64; margin-bottom: 12px; }
        .divider { font-size: 1.4rem; color: #ff1e64; margin-bottom: 15px; }
        .wish { font-size: 1.15rem; font-style: italic; color: #00ffff; line-height: 1.5; text-shadow: 0 0 5px rgba(0,255,255,0.2); }
        .controls { display: flex; justify-content: space-between; width: 100%; max-width: 480px; align-self: center; gap: 15px; }
        button { flex: 1; padding: 16px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 16px; cursor: pointer; color: white; transition: background 0.2s; -webkit-tap-highlight-color: transparent; }
        #btn-prev { background: #2f2f33; }
        #btn-next { background: #ff1e64; box-shadow: 0 0 15px rgba(255,30,100,0.4); }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="ui-layer">
        <div class="header">HAPPY WEDDING ANNIVERSARY</div>
        <div class="card" id="celebration-card">
            <div class="names" id="couple-names">Sunil & Sujatha</div>
            <div class="divider">✨ ❤️ ✨</div>
            <div class="wish" id="couple-wish">May your love story continue to be a beautiful reflection of joy, partnership, and endless laughter!</div>
        </div>
        <div class="controls">
            <button id="btn-prev">⬅ Back</button>
            <button id="btn-next">Next ➡</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        const celebrations = [
            {names: "Sunil & Sujatha", wish: "May your love story continue to be a beautiful reflection of joy, partnership, and endless laughter!"},
            {names: "Jhansi & Siril", wish: "To a spectacular couple! May the bond you share keep growing stronger, brighter, and deeper every year."},
            {names: "Sukeerthi & Raosir", wish: "Wishing an extraordinary anniversary to an inspiring couple. May your days be packed with surprises!"},
            {names: "Sunitha & John Wesley", wish: "May your beautiful melody of love never miss a beat. Wishing you both a magical day of blessings!"}
        ];
        let currentPage = 0;
        let sparks = [];
        let rockets = [];
        let hearts = [];
        class Rocket {
            constructor() {
                this.x = Math.random() * (width - 120) + 60;
                this.y = height;
                this.targetY = Math.random() * (height * 0.35) + (height * 0.15);
                this.vy = -Math.random() * 5 - 13;
            }
            update() {
                this.y += this.vy;
                if (this.y <= this.targetY) {
                    explodeCracker(this.x, this.y);
                    return false;
                }
                return true;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#ffd700';
                ctx.fill();
            }
        }
        class Spark {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 3;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.radius = Math.random() * 4 + 2;
                this.gravity = 0.15;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.012;
            }
            update() {
                this.x += this.vx; this.y += this.vy; this.vy += this.gravity;
                this.radius *= 0.97; this.alpha -= this.decay;
                return this.alpha > 0 && this.radius > 0.4;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
            }
        }
        class Heart {
            constructor() {
                this.x = Math.random() * width; this.y = height + 30;
                this.speed = Math.random() * 1 + 0.7; this.size = Math.random() * 6 + 6;
                this.color = ['#ff1e64', '#ff96b4', '#e63278'][Math.floor(Math.random() * 3)];
                this.angle = Math.random() * Math.PI * 2;
            }
            update() { this.y -= this.speed; this.angle += 0.02; return this.y > -20; }
            draw() {
                const currentX = this.x + Math.sin(this.angle) * 12;
                ctx.fillStyle = this.color; ctx.beginPath();
                const r = this.size / 2;
                ctx.arc(currentX - r, this.y, r, 0, Math.PI * 2);
                ctx.arc(currentX + r, this.y, r, 0, Math.PI * 2);
                ctx.moveTo(currentX - this.size, this.y + r / 4);
                ctx.lineTo(currentX + this.size, this.y + r / 4);
                ctx.lineTo(currentX, this.y + r * 2.2);
                ctx.closePath(); ctx.fill();
            }
        }
        function explodeCracker(x, y) {
            const colors = ['#ff1e64', '#00ffff', '#ffd700', '#ff5000', '#32ff32', '#c832ff', '#ffffff'];
            const c1 = colors[Math.floor(Math.random() * colors.length)];
            const c2 = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 180; i++) {
                sparks.push(new Spark(x, y, i % 2 === 0 ? c1 : c2));
            }
        }
        document.addEventListener('pointerdown', (e) => {
            if (e.target.tagName !== 'BUTTON') {
                explodeCracker(e.clientX, e.clientY);
                explodeCracker(e.clientX, e.clientY);
            }
        });
        function updateUI() {
            const data = celebrations[currentPage];
            const card = document.getElementById('celebration-card');
            card.style.transform = 'scale(0.92)';
            setTimeout(() => {
                document.getElementById('couple-names').innerText = data.names;
                document.getElementById('couple-wish').innerText = data.wish;
                card.style.transform = 'scale(1)';
            }, 120);
            explodeCracker(width / 2, height / 3);
            setTimeout(() => explodeCracker(width / 4, height / 4), 200);
            setTimeout(() => explodeCracker((3 * width) / 4, height / 4), 400);
        }
        document.getElementById('btn-next').addEventListener('click', () => {
            currentPage = (currentPage + 1) % celebrations.length;
            updateUI();
        });
        document.getElementById('btn-prev').addEventListener('click', () => {
            currentPage = (currentPage - 1 + celebrations.length) % celebrations.length;
            updateUI();
        });
        let frameCount = 0;
        function loop() {
            ctx.fillStyle = 'rgba(5, 3, 10, 0.25)';
            ctx.fillRect(0, 0, width, height);
            frameCount++;
            if (frameCount % 30 === 0) rockets.push(new Rocket());
            if (hearts.length < 15 && Math.random() < 0.04) hearts.push(new Heart());
            hearts = hearts.filter(h => { const r = h.update(); if (r) h.draw(); return r; });
            rockets = rockets.filter(r => { const res = r.update(); if (res) r.draw(); return res; });
            sparks = sparks.filter(s => { const res = s.update(); if (res) s.draw(); return res; });
            requestAnimationFrame(loop);
        }
        explodeCracker(width / 2, height / 3);
        loop();
    </script>
</body>
</html>
